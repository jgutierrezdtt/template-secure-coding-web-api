name: Request Completion Verification

# El alumno dispara este workflow cuando cree haber completado todos los pasos.
# Envia una solicitud al repositorio central del instructor (tutorial-verifier),
# que clona este fork, corre todos los validators, y si pasan, escribe
# docs/MEDALLA.md con el token de integridad firmado.
#
# El alumno no puede forjar la medalla: el HMAC usa un secreto que solo
# existe en tutorial-verifier, nunca visible desde este fork.

on:
  workflow_dispatch:

jobs:
  request-verification:
    name: Send verification request to instructor
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Send repository_dispatch to tutorial-verifier
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "event_type": "verify-completion",
            "client_payload": {
              "fork_repo": "${{ github.repository }}",
              "actor": "${{ github.actor }}",
              "tutorial": "${{ github.event.repository.name }}"
            }
          }
          EOF
          )

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.VERIFIER_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/jgutierrezdtt/tutorial-verifier/dispatches \
            -d "$PAYLOAD")

          if [[ "$HTTP_STATUS" == "204" ]]; then
            echo "[OK] Solicitud enviada. El verifier clonara este fork y ejecutara los validators."
            echo "[OK] Si todos los pasos estan completos, recibiras docs/MEDALLA.md en unos minutos."
            echo "[OK] Puedes seguir el progreso en: https://github.com/jgutierrezdtt/tutorial-verifier/actions"
          else
            echo "[FAIL] Error al enviar la solicitud. HTTP status: $HTTP_STATUS"
            echo "[FAIL] Comprueba que el secret VERIFIER_DISPATCH_TOKEN esta configurado en este repositorio."
            exit 1
          fi
