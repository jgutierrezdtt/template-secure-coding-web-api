name: Completion

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  verify-and-award-medal:
    name: Verify all steps and award completion medal
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Check if tutorial has been started
        id: guard
        run: |
          if [ ! -f ".tutorial-started" ]; then
            echo "Tutorial not started yet -- this is the template repo. Skipping."
            echo "skip=true" >> "${GITHUB_OUTPUT}"
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up Python
        if: steps.guard.outputs.skip == 'false'
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55  # v5.5.0
        with:
          python-version: "3.11"

      - name: Run validators and update README
        if: steps.guard.outputs.skip == 'false'
        run: python3 scripts/generate-medal.py
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Commit progress to repository
        if: steps.guard.outputs.skip == 'false' && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/MEDALLA.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "progress: actualizar estado del tutorial [skip ci]"
            git push
          fi
