name: Completion

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  verify-and-award-medal:
    name: Verify all steps and award completion medal
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55  # v5.5.0
        with:
          python-version: "3.11"

      - name: Verify all steps and generate integrity token
        run: python3 scripts/generate-medal.py
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          COMPLETION_SECRET: ${{ secrets.COMPLETION_SECRET }}

      - name: Commit medal to repository
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/MEDALLA.md
          if git diff --cached --quiet; then
            echo "Medal already up to date — no commit needed"
          else
            git commit -m "award: medalla de completacion del tutorial [skip ci]"
            git push
          fi
