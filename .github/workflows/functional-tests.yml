name: Functional Tutorial Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  functional-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run functional tests
        run: |
          python scripts/test_tutorial_functional.py
